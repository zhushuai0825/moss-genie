<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">心愿 Moss 精灵产品架构图</title>
  <desc id="desc">毛绒交互终端、边缘控制层、本地电脑大脑三层架构。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbf1df"/>
      <stop offset="52%" stop-color="#e8f1df"/>
      <stop offset="100%" stop-color="#dcecef"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#9bca8c"/>
      <stop offset="100%" stop-color="#5f9f78"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1e4a3e"/>
      <stop offset="100%" stop-color="#102820"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#203b32" flood-opacity=".16"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M0,0 L13,6.5 L0,13 z" fill="#24493f"/>
    </marker>
    <style>
      .title{font:800 34px "PingFang SC","Microsoft YaHei",sans-serif;fill:#172d27}
      .subtitle{font:600 18px "PingFang SC","Microsoft YaHei",sans-serif;fill:#587166}
      .card{fill:#fffaf1;stroke:#d9c9a8;stroke-width:2;rx:28;filter:url(#shadow)}
      .darkCard{fill:url(#dark);stroke:#17372e;stroke-width:2;rx:28;filter:url(#shadow)}
      .h{font:800 27px "PingFang SC","Microsoft YaHei",sans-serif;fill:#172d27}
      .hLight{font:800 27px "PingFang SC","Microsoft YaHei",sans-serif;fill:#fffaf1}
      .body{font:600 17px "PingFang SC","Microsoft YaHei",sans-serif;fill:#557166}
      .bodyLight{font:600 17px "PingFang SC","Microsoft YaHei",sans-serif;fill:#cfe3d7}
      .small{font:700 15px "PingFang SC","Microsoft YaHei",sans-serif;fill:#49685c}
      .line{fill:none;stroke:#24493f;stroke-width:5;stroke-linecap:round;marker-end:url(#arrow)}
      .dash{fill:none;stroke:#24493f;stroke-width:4;stroke-linecap:round;stroke-dasharray:9 10;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="98" cy="92" r="60" fill="#f0c76a" opacity=".45"/>
  <circle cx="1170" cy="628" r="96" fill="#68b7ad" opacity=".20"/>

  <text x="70" y="68" class="title">心愿 Moss 精灵 · 本地 AI 毛绒终端架构</text>
  <text x="72" y="102" class="subtitle">玩偶端负责可塞入、可供电、可触摸的交互体验；大模型、记忆与电脑控制在本地电脑端完成。</text>

  <rect x="70" y="156" width="310" height="410" class="card"/>
  <text x="122" y="220" class="h">毛绒交互终端</text>
  <path d="M158 412 C111 386 112 296 148 257 C123 204 161 167 218 184 C253 141 317 159 331 218 C378 239 376 309 347 346 C355 409 299 459 232 436 C211 452 181 445 158 412Z" fill="url(#green)" stroke="#3f705e" stroke-width="6"/>
  <path d="M140 247 C95 236 88 283 128 304" fill="none" stroke="#3f705e" stroke-width="10" stroke-linecap="round"/>
  <path d="M339 245 C386 225 407 272 365 304" fill="none" stroke="#3f705e" stroke-width="10" stroke-linecap="round"/>
  <circle cx="211" cy="289" r="13" fill="#102820"/>
  <circle cx="290" cy="289" r="13" fill="#102820"/>
  <path d="M230 330 Q250 352 279 330" fill="none" stroke="#102820" stroke-width="7" stroke-linecap="round"/>
  <circle cx="190" cy="380" r="20" fill="#f7df8e"/>
  <circle cx="306" cy="382" r="20" fill="#f7df8e"/>
  <text x="118" y="495" class="body">麦克风 · 喇叭 · 触摸 · RGB 情绪灯</text>
  <text x="118" y="524" class="body">隐藏在玩偶内部，负责用户感知</text>

  <rect x="485" y="156" width="310" height="180" class="card"/>
  <rect x="530" y="209" width="90" height="72" rx="16" fill="#e9b56d" stroke="#8a6130" stroke-width="5"/>
  <path d="M548 231 H602 M548 255 H602" stroke="#fff5df" stroke-width="8" stroke-linecap="round"/>
  <rect x="659" y="209" width="90" height="72" rx="16" fill="#a4cdb3" stroke="#4c7663" stroke-width="5"/>
  <path d="M677 231 H731 M677 255 H731" stroke="#fff5df" stroke-width="8" stroke-linecap="round"/>
  <text x="528" y="314" class="h">ESP32-S3 外设层</text>
  <text x="528" y="346" class="body">I2S 音频、触摸采样、灯光状态机、Wi-Fi 心跳</text>

  <rect x="485" y="386" width="310" height="180" class="card"/>
  <rect x="545" y="438" width="190" height="76" rx="18" fill="#d9e8d2" stroke="#55735d" stroke-width="5"/>
  <circle cx="580" cy="476" r="12" fill="#6faa72"/>
  <circle cx="620" cy="476" r="12" fill="#f1c66b"/>
  <circle cx="660" cy="476" r="12" fill="#d8644f"/>
  <path d="M695 452 h22 v48 h-22" fill="none" stroke="#55735d" stroke-width="7"/>
  <text x="526" y="544" class="h">Luckfox Linux 网关</text>
  <text x="526" y="576" class="body">局域网桥接、缓存、设备管理；不承担 8B LLM</text>

  <rect x="900" y="156" width="310" height="410" class="darkCard"/>
  <rect x="950" y="210" width="210" height="135" rx="24" fill="#edf6e9"/>
  <path d="M991 289 C971 259 992 227 1029 236 C1048 210 1087 219 1097 249 C1131 251 1145 288 1125 312 C1131 342 1095 357 1075 335 C1047 355 1006 340 1010 309 C1002 305 996 299 991 289Z" fill="#89bd96" stroke="#365f4f" stroke-width="5"/>
  <path d="M1023 276 H1096 M1036 303 H1085" stroke="#102820" stroke-width="7" stroke-linecap="round"/>
  <text x="947" y="410" class="hLight">本地电脑大脑</text>
  <text x="947" y="449" class="bodyLight">Ollama / llama.cpp · Qwen 或 Hermes</text>
  <text x="947" y="480" class="bodyLight">OpenClaw / Agent 调度 · 本地记忆库</text>
  <text x="947" y="511" class="bodyLight">电脑控制客户端 · 权限确认 · 审计日志</text>

  <path class="line" d="M380 260 H485"/>
  <text x="410" y="242" class="small">I2S / GPIO</text>
  <path class="line" d="M380 462 H485"/>
  <text x="402" y="444" class="small">USB / UART</text>
  <path class="dash" d="M795 246 H900"/>
  <text x="807" y="226" class="small">Wi-Fi / WebSocket / MQTT</text>
  <path class="dash" d="M795 476 H900"/>
  <text x="825" y="456" class="small">以太网 / USB 网桥</text>

  <rect x="78" y="610" width="1124" height="54" rx="27" fill="#fffaf1" opacity=".94"/>
  <text x="126" y="644" class="body">数据原则：语音、记忆、电脑控制全走本地网络；高风险指令二次确认；敏感记忆可查询、可删除、可导出。</text>
</svg>
