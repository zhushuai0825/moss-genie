    <rect x="58" y="45" width="134" height="94" rx="18" fill="#efbd73" stroke="#8a6332" stroke-width="5"/>
    <path d="M74 72 h102 M74 98 h102 M74 124 h102" stroke="#fff3df" stroke-width="7" stroke-linecap="round"/>
    <circle cx="58" cy="45" r="6" fill="#8a6332"/>
    <circle cx="192" cy="45" r="6" fill="#8a6332"/>
    <text x="24" y="167" class="name">ESP32-S3</text>
    <text x="24" y="193" class="meta">麦克风 / 灯控 / 触摸</text>
