<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">硬件配置示意图</title>
  <desc id="desc">心愿 Moss 精灵推荐硬件清单的中等精度示意图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5eddf"/>
      <stop offset="100%" stop-color="#e1ebdc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#213b32" flood-opacity=".16"/>
    </filter>
    <style>
      .title{font:800 36px "PingFang SC","Microsoft YaHei",sans-serif;fill:#182e27}
      .card{fill:#fffaf1;stroke:#decfab;stroke-width:2;rx:24;filter:url(#shadow)}
      .name{font:700 23px "PingFang SC","Microsoft YaHei",sans-serif;fill:#17322b}
      .meta{font:500 17px "PingFang SC","Microsoft YaHei",sans-serif;fill:#4a665d}
      .price{font:800 22px "PingFang SC","Microsoft YaHei",sans-serif;fill:#b66a2d}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="62" y="70" class="title">硬件配置图：预算内工程样机版</text>
  <text x="64" y="104" class="meta">图片为自绘示意，可替换为最终采购商品图；价格按淘宝常见区间预估。</text>

  <g transform="translate(64 145)">
    <rect class="card" width="250" height="210"/>
    <rect x="42" y="48" width="166" height="94" rx="18" fill="#d9e8d2" stroke="#53725c" stroke-width="5"/>
    <circle cx="75" cy="94" r="12" fill="#76ad74"/>
    <circle cx="112" cy="94" r="12" fill="#efc66c"/>
    <path d="M145 62 h34 v64 h-34" fill="none" stroke="#53725c" stroke-width="7"/>
    <text x="24" y="167" class="name">Luckfox Pico Pro</text>
    <text x="24" y="193" class="meta">Linux 网关 / 以太网</text>
  </g>

  <g transform="translate(367 145)">
